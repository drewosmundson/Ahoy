<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ahoy.io</title>
  <link rel="stylesheet" href="index.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="screen-home">
    <div class="container">
      <h1>Ahoy.io</h1>

      <!-- Main Menu -->
      <div id="screen-menu-main" class="section">
        <button id="button-main-singleplayer">Single Player</button>
        <button id="button-main-multiplayer-join">Join Lobby</button> 
        <button id="button-main-multiplayer-create">Create Lobby</button>
      </div>

      <!-- Single Player Menu -->
      <div id="screen-menu-singleplayer" class="section hidden">
        <button id="button-singleplayer-start">Start Game</button>
      </div>

      <!-- Host Create Lobby -->
      <div id="screen-lobby-create" class="section hidden">
        <div class="form-lobby-create">
          <label for="input-host-name">Your Name:</label>
          <input type="text" id="input-host-name" name="hostNickname"/>
          <button id="button-lobby-create">Create Lobby</button>
        </div>
      </div>

      <!-- Participant join lobby -->
      <div id="screen-lobby-join" class="section hidden">
        <div class="form-lobby-join">
            <label for="input-lobby-code">Lobby Code:</label>
            <input type="text" id="input-lobby-code" name="lobbyCode" required />
          <div>
            <button id="button-lobby-join">Join Lobby</button>
          </div>
        </div>
      </div>


      <div id="screen-lobby-host" class="section hidden">
        <div class="lobby-info">
          <p>Lobby Code: <span id="lobbyCodeDisplay"></span></p>
        </div>
        <div id="playerList">
          <h3>Players:</h3>
          <ul id="playerListItems"></ul>
        </div>
        <button id="button-multiplayer-start">Start Game</button>
        <button id="leaveLobbyButton">Leave Lobby</button>

      </div>


      <div id="screen-lobby-participant" class="section hidden">
        <div class="lobby-info">
          <p>Lobby Code: <span id="lobby-code"></span></p>
        </div>
        <div class="lobby-players">
          <h3>Players:</h3>
          <ul class="lobby-player-list"></ul>
        </div>
        <button class="button-lea">Leave Lobby</button>
        <div class="watingForHost">
          <h2>Waiting for host to start the game...</h2>
        </div>
      </div>

      </div>
    </div>
  </div>

  <!-- Game Container -->
  <div id="screen-game">
    <canvas id="canvas-game"></canvas>
  </div>

  <script type="module" src="../client/main.js"></script>
  <script src="/socket.io/socket.io.js"></script>

</body>
</html>
